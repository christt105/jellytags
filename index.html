<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JellyTags</title>
  <link rel="stylesheet" href="/src/index.css" />
</head>

<body>
  <div class="app-container">
    <header class="glass-panel header-panel">
      <div class="header-title-group">
        <h1 class="header-title">
          JellyTags
        </h1>
        <div class="header-search header-search-wrapper">
          <input id="search-input" class="glass-input search-input-field" placeholder="Search by name or tag..." />
        </div>
      </div>

      <div class="header-actions">
        <select id="sort-select" class="glass-input sort-select-field">
          <option value="name-asc">Alphabetical (A-Z)</option>
          <option value="name-desc">Alphabetical (Z-A)</option>
          <option value="date-desc" selected>Date Added (Newest)</option>
          <option value="date-asc">Date Added (Oldest)</option>
        </select>
        <button id="refresh-btn" class="glass-button header-button">
          Refresh
        </button>
        <button id="sidebar-toggle" class="glass-button header-button mobile-only" style="display: none;">
          ☰
        </button>
      </div>
    </header>

    <div class="main-layout">
      <div class="main-content">
        <div id="loading-indicator" class="loading-indicator">
          <h3>Loading your library...</h3>
        </div>
        <div id="media-grid" class="media-grid">
          <!-- Grid Items go here -->
        </div>
      </div>

      <div class="sidebar-container">
        <div id="sidebar-overlay" class="sidebar-overlay"></div>
        <div id="tag-editor-sidebar" class="glass-panel tag-editor-sidebar">
          <div class="sidebar-header">
            <h3 class="sidebar-title">Tag Editor</h3>
            <button id="sidebar-close" class="sidebar-close-btn mobile-only">&times;</button>
          </div>
          <p class="sidebar-empty-msg">Select items from the grid to edit their tags.</p>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
